name: Daily Manchester Update

on:
  schedule:
    # 14:00 UTC is 10:00 AM in Manchester, CT
    - cron: '0 22 * * *'
  workflow_dispatch: # This adds a manual "Play" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python manchester_deals.py
